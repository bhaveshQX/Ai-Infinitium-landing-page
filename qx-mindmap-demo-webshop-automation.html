<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg:      #0d0d14;
    --surface: rgba(255,255,255,0.05);
    --border:  rgba(255,255,255,0.10);
    --text:    rgba(230,230,245,0.90);

    --green:   #34d399;
    --orange:  #fb923c;
    --blue:    #60a5fa;
    --pink:    #f472b6;
    --red:     #f87171;
    --radius:  10px;

  body {
    height: 100vh;

    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  /* Subtle ambient gradient — just two soft blobs, no animation jitter */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 15% 30%, rgba(109,40,217,0.12) 0%, transparent 70%),

    pointer-events: none;
  }

  /* ── Shared surface style ── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  /* ── Header ── */
  #header {
    position: fixed;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 18px;

    font-weight: 700;

    text-transform: uppercase;

    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .legend-row {

    align-items: center;
    gap: 8px;
    margin-bottom: 7px;
    font-size: 12px;
    color: rgba(210,210,235,0.75);
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── Stats bar ── */
  #stats {
    position: fixed;
    bottom: 18px;
    left: 18px;
    display: flex;
    z-index: 20;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .stat {
    padding: 11px 18px;
    text-align: center;
    cursor: pointer;
    background: var(--surface);
    border-right: 1px solid var(--border);
    transition: background 0.15s;
    user-select: none;
    position: relative;
  }
  .stat:last-child { border-right: none; }
  .stat:hover    { background: rgba(255,255,255,0.09); }
  .stat.active   { background: rgba(255,255,255,0.12); }
  .stat.active::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: currentColor;
    border-radius: 1px;
  }
  .stat-val { font-size: 20px; font-weight: 700; line-height: 1; }
  .stat-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.09em; margin-top: 3px; }

  /* ── Hint ── */
  #hint {
    position: fixed;
    bottom: 18px;
    right: 16px;
    padding: 7px 12px;
    z-index: 20;
    font-size: 11px;
    color: var(--muted);
  }

  /* ── Mindmap canvas ── */
  #mm {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    display: block;
  }

  /*
   * markmap injects its own <style> inside the SVG that sets node rect fill
   * to white. These rules must live in the PAGE stylesheet (not patched via JS)
   * so they win the cascade via specificity.
   */
  #mm .markmap-node > rect              { fill: transparent !important; }
  #mm .markmap-node > rect:hover        { fill: rgba(255,255,255,0.06) !important; }
  #mm .markmap-foreign                  { background: transparent !important; }
  #mm .markmap-foreign > div            { background: transparent !important; color: rgba(225,225,245,0.90) !important; }
  #mm foreignObject                     { overflow: visible; }
  #mm foreignObject *                   { background: transparent !important; color: rgba(225,225,245,0.90) !important; }
  /* markmap renders <text> nodes for some label types */
  #mm text                              { fill: rgba(225,225,245,0.90) !important; }
  /* connector lines */
  #mm path.markmap-link                 { stroke: rgba(150,150,200,0.18) !important; stroke-width: 1.5px !important; }
  /* collapse/expand circles */
  #mm .markmap-node circle              { stroke-width: 1.5px !important; }

  /* Off-screen stub so markmap autoloader fetches its deps */
  #mm-stub { position: fixed; top: -9999px; left: -9999px; width: 1px; height: 1px; overflow: hidden; }

<script>
// ── SVG style injection ───────────────────────────────────────────────────────
// markmap appends its own <style> INSIDE the SVG after every render, which can
// override page-level CSS. We counter by inserting our own <style> as the very
// first child of the SVG — same specificity level, but earlier in source order
// so !important on our page rules wins the tie.
function injectSvgStyle(svg) {
  var existing = svg.querySelector('style#qx-dark');
  if (existing) return;
  var s = document.createElementNS('http://www.w3.org/2000/svg', 'style');
  s.id = 'qx-dark';
  s.textContent =
    '.markmap-node > rect { fill: transparent !important; }' +
    '.markmap-node > rect:hover { fill: rgba(255,255,255,0.07) !important; }' +
    '.markmap-foreign { background: transparent !important; }' +
    '.markmap-foreign > div { background: transparent !important; color: rgba(225,225,245,0.90) !important; }' +
    'text { fill: rgba(225,225,245,0.90) !important; }' +
    'path.markmap-link { stroke: rgba(150,150,200,0.18) !important; stroke-width: 1.5px !important; }';
  svg.insertBefore(s, svg.firstChild);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function stripHtml(h) {
  return (h || '').replace(/<[^>]*>/g, '');
}

function setFoldDeep(node, fold) {
  if (!node.state) node.state = {};
  node.state.fold = fold;
  (node.children || []).forEach(function(c) { setFoldDeep(c, fold); });
}

// ── KPI click → focus that category ──────────────────────────────────────────
// markmap's renderData() runs after setData() and resets state.fold for any
// node at depth >= initialExpandLevel. Fixing this requires setOptions with
// initialExpandLevel:-1 BEFORE setData so the internal reset is skipped.
function focusCategory(keyword, statEl) {
  var mm   = window._mm;
  var root = window._root;
  if (!mm || !root) return;

  document.querySelectorAll('.stat.active').forEach(function(el) { el.classList.remove('active'); });
  if (statEl) statEl.classList.add('active');

  // Step 1: collapse everything
  (root.children || []).forEach(function(child) { setFoldDeep(child, 1); });

  // Step 2: find the matching section
  var target = null;
  (root.children || []).forEach(function(child) {
    var text = stripHtml(child.content || '').toLowerCase();
    if (text.indexOf(keyword.toLowerCase()) !== -1) target = child;
  });

  // Step 3: open section + direct children; keep grandchildren collapsed
  if (target) {
    if (!target.state) target.state = {};
    target.state.fold = 0;
    (target.children || []).forEach(function(c) {
      if (!c.state) c.state = {};
      c.state.fold = 0;
      (c.children || []).forEach(function(gc) { setFoldDeep(gc, 1); });
    });
  }

  // Step 4: render with level:-1 so our fold states are not overwritten
  mm.setOptions({ initialExpandLevel: -1 });
  mm.setData(root);
  setTimeout(function() {
    mm.fit();
    injectSvgStyle(document.getElementById('mm'));
  }, 280);
}

// ── Boot ─────────────────────────────────────────────────────────────────────
var _poll = setInterval(function() {
  var wm = window.markmap;
  if (!wm || !wm.Transformer || !wm.Markmap) return;
  clearInterval(_poll);

  try {
    var t   = new wm.Transformer();
    var res = t.transform(MD);
    var svg = document.getElementById('mm');

    var mm = wm.Markmap.create(svg, {
      maxWidth:           320,
      initialExpandLevel: 2,
      colorFreezeLevel:   2,
      duration:           250,
    }, res.root);

    window._mm   = mm;
    window._root = res.root;

    function patch() { injectSvgStyle(svg); }

    requestAnimationFrame(function() {
      requestAnimationFrame(function() { mm.fit(); patch(); });
    });
    setTimeout(function() { mm.fit(); patch(); }, 700);

    // Re-patch whenever markmap mutates the SVG (node expand/collapse)
    new MutationObserver(patch).observe(svg, { childList: true, subtree: true });

  } catch(e) {
    console.error('mindmap render failed:', e);
  }
}, 100);
</script>
